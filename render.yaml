services:
  # Backend API Service
  - type: web
    name: eluno-oms-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: eluno-oms-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true

  # Frontend Static Site
  - type: static
    name: eluno-oms-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://eluno-oms-backend.onrender.com/api
    pullRequestPreviewsEnabled: true
    autoDeploy: true

databases:
  - name: eluno-oms-db
    plan: free
    databaseName: eluno_oms
    user: eluno_user
