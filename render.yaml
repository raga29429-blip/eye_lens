services:
  # Backend API Service
  - type: web
    name: eluno-oms-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: eluno-oms-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        value: https://eye-lens-designer.onrender.com/api
    autoDeploy: true

databases:
  - name: eluno-oms-db
    plan: free
    databaseName: eluno_oms
    user: eluno_user
